# ---- Server ----
server.port=8080

# ---- Database (H2, file-based so data survives restarts) ----
# For production, swap these 4 lines for a real Postgres/MySQL connection instead.
spring.datasource.url=jdbc:h2:file:./data/rekadb;AUTO_SERVER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Optional: browse the database at http://localhost:8080/h2-console (JDBC URL above, user "sa", blank password)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ---- Email alarms (optional) ----
# Set reka.alarm.mail-enabled=true and fill in real SMTP creds + spring.mail.* below to get
# email reminders even when nobody has the calendar open in a browser.
reka.alarm.mail-enabled=false
reka.alarm.from-address=no-reply@reka.local
reka.alarm.agency-email=

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
